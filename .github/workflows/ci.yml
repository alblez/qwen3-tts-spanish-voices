name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (skip [mlx], runners can't use Apple Silicon)
        run: |
          python -m pip install --upgrade pip
          # Install runtime deps that the package declares, minus mlx extras.
          pip install -e ".[mcp,speed]"
          pip install pytest

      - name: Show versions
        run: |
          python --version
          pip show qwen3-tts-spanish-voices | head -5 || true

      - name: Run tests (skip slow / mlx-dependent)
        run: pytest -q -m "not slow"
