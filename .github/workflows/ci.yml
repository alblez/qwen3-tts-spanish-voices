name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger for macOS job

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ruff (pinned to match pyproject [dev])
        run: python -m pip install "ruff==0.15.*"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (skip [mlx], runners can't use Apple Silicon)
        run: |
          python -m pip install --upgrade pip
          # Install runtime deps that the package declares, minus mlx extras.
          pip install -e ".[mcp,speed]"
          pip install pytest

      - name: Show versions
        run: |
          python --version
          pip show qwen3-tts-spanish-voices | head -5 || true

      - name: Run tests (skip slow / mlx-dependent)
        run: pytest -q -m "not slow"

  test-macos:
    # macOS job: exercises slow + requires_mlx tests with real Apple Silicon.
    # Runs on workflow_dispatch only — model downloads (~2 GB) are too costly
    # for every push/PR. Enable on a nightly schedule once HF cache is warm.
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Cache Hugging Face models
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('src/spanish_tts/engine.py') }}
          restore-keys: hf-models-

      - name: Install package (with mlx extras for Apple Silicon)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest

      - name: Show versions
        run: |
          python --version
          pip show qwen3-tts-spanish-voices | head -5 || true

      - name: Run slow + mlx tests
        run: pytest -q -m "slow or requires_mlx"
