version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "build"
    labels:
      - dependencies
    groups:
      dev-tools:
        patterns:
          - "ruff"
          - "pytest*"
          - "pre-commit"

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "build"
    labels:
      - dependencies
